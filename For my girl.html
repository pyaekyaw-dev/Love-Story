<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Game</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background: linear-gradient(135deg,#ffb6c1,#e6ccff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:#333;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:90%;
max-width:420px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#ff6fa5;
color:white;
}

.option{
background:#f2f2f2;
}

.progress{
height:8px;
background:#eee;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.bar{
height:8px;
background:#ff6fa5;
width:0%;
transition:0.4s;
}

.hidden{
display:none;
}

#noBtn{
background:#ff8c8c;
color:white;
position:relative;
}

#yesBtn{
background:#4CAF50;
color:white;
}

#maybeBtn{
background:#ffb84d;
color:white;
}

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<div id="start">
<h2>Hi there 💌</h2>
<p>I made a small game just for you.<br>
If you finish it, you'll discover a secret.</p>
<button class="primary" onclick="startGame()">Start Game</button>
</div>

<div id="quiz" class="hidden">
<div class="progress"><div class="bar" id="bar"></div></div>

<h3 id="question"></h3>

<div id="answers"></div>
</div>

<div id="final" class="hidden">
<h2>You finished the game 🎉</h2>
<p>Now I have one real question...</p>
<button class="primary" onclick="showQuestion()">Continue</button>
</div>

<div id="confess" class="hidden">
<h2>Would you like to go on a date with me? ❤️</h2>

<button id="yesBtn" onclick="yes()">YES 😊</button>
<button id="maybeBtn" onclick="maybe()">Maybe 🤔</button>
<button id="noBtn">No 😅</button>

<p id="result"></p>

</div>

</div>

<div class="hearts" id="hearts"></div>

<script>

const questions=[
{
q:"Which coffee do I like the most?",
a:["Latte","Cappuccino","Black Coffee ☕"]
},
{
q:"Perfect weekend activity?",
a:["Watching movies","Going to a cafe","Sleeping"]
},
{
q:"Which place is best for a date?",
a:["Cafe ☕","Cinema 🎬","Park 🌿"]
},
{
q:"Which emoji is cutest?",
a:["😊","❤️","🤔"]
}
];

let index=0;

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){

let q=questions[index];
document.getElementById("question").innerText=q.q;

let answersHTML="";

q.a.forEach(ans=>{
answersHTML+=`<button class="option" onclick="next()">${ans}</button>`;
});

document.getElementById("answers").innerHTML=answersHTML;

document.getElementById("bar").style.width=((index)/questions.length*100)+"%";

}

function next(){
index++;

if(index<questions.length){
showQuestion();
}else{
document.getElementById("quiz").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");
}
}

function showQuestion(){
document.getElementById("final").classList.add("hidden");
document.getElementById("confess").classList.remove("hidden");
}

function yes(){
document.getElementById("result").innerText="You just made my day ❤️ Let's get coffee together!";
createHearts();
}

function maybe(){
document.getElementById("result").innerText="I'll take that as hope 😄";
}

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
const i=Math.floor(Math.random()*200)-100;
const j=Math.floor(Math.random()*200)-100;
noBtn.style.transform=`translate(${i}px,${j}px)`;
});

function createHearts(){
const container=document.getElementById("hearts");

for(let i=0;i<20;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=Math.random()*20+20+"px";
container.appendChild(heart);

setTimeout(()=>heart.remove(),4000);
}

}

</script>

</body>
</html>
